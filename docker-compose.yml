version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govli_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: govli_secure_password_2024
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./modules/foia/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: govli_ai
      DB_USER: postgres
      DB_PASSWORD: govli_secure_password_2024
      JWT_SECRET: c8f9a7b3d2e1f6g4h5i8j7k6l5m4n3o2p1q9r8s7t6u5v4w3x2y1z0A9B8C7D6E5F4G3H2I1J0
      JWT_EXPIRY: 8h
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      BCRYPT_ROUNDS: 12
      MAX_LOGIN_ATTEMPTS: 5
      LOCK_TIME: 900000
      MAX_FILE_SIZE: 10485760
      ALLOWED_FILE_TYPES: pdf,doc,docx,jpg,jpeg,png,gif
      EMAIL_FROM: noreply@govli.ai
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped
    command: sh -c "sleep 10 && npm start"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@govli.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: govli_minio
      MINIO_ROOT_PASSWORD: govli_minio_2026
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  postgres-data:
  redisdata:
  miniodata:
